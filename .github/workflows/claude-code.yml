name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # Required by Claude Code Action for OIDC authentication

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Only run if the comment contains @claude (mitigates untrusted trigger attacks)
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1  # Reduced from 0 to minimize attack surface

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1  # TODO: Pin to commit SHA when stable release available
        with:
          # Your Claude API token (OAuth token from claude setup-token)
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          
          # Optional: Customize the review prompt
          # prompt: |
          #   Review this code for:
          #   - Security vulnerabilities
          #   - Best practices
          #   - Potential bugs
          #   - Performance issues
          
          # Optional: Specify which files to review
          # include_patterns: "*.py,*.js,*.ts"
          # exclude_patterns: "node_modules/**,*.min.js"
