name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for better context

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # Your Claude API token (OAuth token from claude setup-token)
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          
          # Optional: Customize the review prompt
          # prompt: |
          #   Review this code for:
          #   - Security vulnerabilities
          #   - Best practices
          #   - Potential bugs
          #   - Performance issues
          
          # Optional: Specify which files to review
          # include_patterns: "*.py,*.js,*.ts"
          # exclude_patterns: "node_modules/**,*.min.js"
